# Production stack for OpenWA with automatic HTTPS.
#
#   caddy (:80/:443, Let's Encrypt)  ->  dashboard (nginx :80)
#                                         ├─ serves the SPA
#                                         ├─ /api/      -> openwa:2785
#                                         └─ /socket.io/-> openwa:2785
#
# The API service is named `openwa` so the dashboard's nginx upstream
# (proxy_pass http://openwa:2785) resolves on the compose network.
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:
  openwa:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    # Give the engine time to close Chromium cleanly on redeploy so it removes
    # its own profile lock (avoids "profile in use" on the next launch).
    stop_grace_period: 30s
    env_file:
      - .env.prod
    environment:
      - PORT=2785
      - SESSION_DATA_PATH=/app/data/sessions
      - STORAGE_LOCAL_PATH=/app/data/media
      - PLUGINS_DIR=/app/data/plugins
    expose:
      - '2785'
    volumes:
      - openwa-data:/app/data
    healthcheck:
      test:
        ['CMD', 'node', '-e', "require('http').get('http://localhost:2785/api/health',r=>process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    depends_on:
      - openwa
    expose:
      - '80'

  caddy:
    image: caddy:2
    container_name: openwa-caddy
    restart: unless-stopped
    depends_on:
      - dashboard
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  openwa-data:
  caddy-data:
  caddy-config:
